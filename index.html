<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Georgia;}

body,html{
width:100%;height:100%;
overflow:hidden;
color:white;
background:black;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;height:100%;
background:url('bg.jpg') center/cover no-repeat;
filter:blur(6px) brightness(0.5);
z-index:0;
}

/* PARTICLES */
.particle{
position:fixed;
width:3px;height:3px;
background:white;
opacity:0.3;
border-radius:50%;
animation:float 10s linear infinite;
}

@keyframes float{
0%{transform:translateY(100vh);}
100%{transform:translateY(-10vh);}
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;height:100%;
background:rgba(0,0,0,0.6);
z-index:1;
}

/* TEXT */
.content{
position:relative;
z-index:2;
width:90%;
max-width:700px;
max-height:80vh;
overflow-y:auto;
margin:auto;
padding:20px;
line-height:1.8;
white-space:pre-line;
}

/* BUTTON */
button{
position:absolute;
top:45%;
left:50%;
transform:translate(-50%,-50%);
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:black;
z-index:5;
}

/* CHAT */
.chat{
position:absolute;
bottom:0;
width:100%;
padding:15px;
display:none;
}

.bubble{
max-width:70%;
padding:10px;
border-radius:10px;
margin:8px;
}

.me{
background:#DCF8C6;
color:black;
margin-left:auto;
}

.status{
font-size:10px;
opacity:0.6;
}

.typing{
font-size:12px;
opacity:0.6;
margin-left:10px;
}

/* BLACKOUT */
#blackout{
position:fixed;
width:100%;height:100%;
background:black;
opacity:0;
z-index:10;
transition:5s;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content" id="text"></div>

<button onclick="start()" ontouchstart="start()">Klik pelan ya...</button>

<div class="chat" id="chat"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="blackout"></div>

<script>
const textEl=document.getElementById("text");
const chatEl=document.getElementById("chat");

let started=false;

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

// PARTICLES GENERATOR
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"%";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.body.appendChild(p);
}

// TYPEWRITER
async function typeText(text){
textEl.innerHTML="";
for(let i=0;i<text.length;i++){
textEl.innerHTML+=text[i];
await sleep(25);
}
}

async function start(){
if(started)return;
started=true;

document.querySelector("button").style.display="none";

const music=document.getElementById("music");
music.volume=0;
music.play();

let vol=0;
let fade=setInterval(()=>{
if(vol<0.4){
vol+=0.02;
music.volume=vol;
}else clearInterval(fade);
},200);

// TEKS FULL (TYPEWRITER)
await typeText(`aku harap kita asing untuk saling memperbaiki diri.
jika waktunya tiba aku harap ada kesempatan buat bersama,
aku hargai keputusan kamu walau aku tau sebab pastinya
setidaknya kamu pernah jadi warna di antara hitam putih perjalanan hidupku,

senang mengenal mu
senang pernah dilibatkan dalam hal kecil dihidup kamu,

aku bakal berhenti di hari ketiga ini
karena aku lelah berkelahi sama isi pikiranku,

kisah ini lucu tapi ya cukup membekas,

jika ketidaksengajaan yang memperkenalkan kita terjadi lagi
aku masih dan akan sangat senang
bahkan aku siap menerima kehadiran kamu dengan segala kondisi kamu.

sesibuk apapun jangan lupa sama kesehatan kamu ya
karena rezeki yang gak pernah putus diberikan itu kesehatan,

kamu sedang survive sendirian
kalau sampai sakit itu memperburuk keadaan,

jangan pernah berhenti jadi orang baik
walau sebatas niat ataupun sudah tereksekusi.

\n\nThank you for everything.
\n\nFrom Fadlian, March 18, 2026`);

await sleep(4000);

// CHAT MODE
chatEl.style.display="block";

async function send(msg,centang="✓✓"){
let div=document.createElement("div");
div.className="bubble me";
div.innerHTML=msg+"<div class='status'>"+centang+"</div>";
chatEl.appendChild(div);
await sleep(2500);
}

async function typing(){
let t=document.createElement("div");
t.className="typing";
t.innerText="typing...";
chatEl.appendChild(t);
await sleep(3000);
t.remove();
}

// CHAT FLOW (EMOTIONAL ATTACK)
await send("Kamu masih inget aku?");
await send("Atau aku cuma fase?");
await send("Gapapa sih kalau iya...");

await typing();

await send("Aku masih mikirin kamu.");
await send("Tapi aku juga sadar...");
await send("Gak semua yang kita mau harus kita miliki 🙂");

await typing();

// FINAL HIT
await send("Jadi... aku mundur ya.", "✓"); // centang 1 💀

await sleep(4000);

// BLACKOUT
document.getElementById("blackout").style.opacity=1;

// MUSIC FADE OUT
let fadeOut=setInterval(()=>{
if(music.volume>0.02){
music.volume-=0.01;
}else clearInterval(fadeOut);
},200);

}
</script>

</body>
</html>
