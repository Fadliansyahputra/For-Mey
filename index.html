<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
* {margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body,html{
  width:100%;height:100%;
  overflow:hidden;
  background:black;
  color:white;
}

/* BG */
.bg{
  position:fixed;
  width:100%;height:100%;
  background:url('bg.jpg') center/cover no-repeat;
  filter:blur(10px) brightness(0.5);
  z-index:0;
}

/* Overlay */
.overlay{
  position:fixed;
  width:100%;height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1;
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100%;
  text-align:center;
  padding:20px;
}

.text{
  max-width:600px;
  font-size:18px;
  line-height:1.8;
}

/* BUTTON */
button{
  position:absolute;
  top:45%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  z-index:5;
}

/* CHAT */
.chat{
  position:absolute;
  bottom:20px;
  width:100%;
  padding:15px;
  display:none;
}

.bubble{
  max-width:70%;
  padding:10px 14px;
  border-radius:10px;
  margin:8px;
  font-size:14px;
}

.me{
  background:#DCF8C6;
  color:black;
  margin-left:auto;
}

.status{
  font-size:10px;
  opacity:0.6;
  margin-top:2px;
}

.typing{
  font-size:12px;
  opacity:0.7;
  margin-left:10px;
}

/* BLACKOUT */
#blackout{
  position:fixed;
  width:100%;height:100%;
  background:black;
  opacity:0;
  z-index:10;
  transition:4s;
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
  <div class="text" id="text"></div>
</div>

<button onclick="start()" ontouchstart="start()">Klik pelan ya...</button>

<div class="chat" id="chat"></div>

<audio id="music" loop preload="auto">
  <source src="music.mp3" type="audio/mpeg">
</audio>

<div id="blackout"></div>

<script>
const textEl = document.getElementById("text");
const chatEl = document.getElementById("chat");

let started=false;

function sleep(ms){return new Promise(r=>setTimeout(r,ms));}

async function start(){
  if(started) return;
  started=true;

  document.querySelector("button").style.display="none";

  const music=document.getElementById("music");
  try{
    await music.play();
  }catch(e){
    console.log("Autoplay blocked, retry...");
  }

  music.volume=0;

  let vol=0;
  let fade=setInterval(()=>{
    if(vol<0.4){
      vol+=0.02;
      music.volume=vol;
    }else clearInterval(fade);
  },200);

  // TEKS AWAL
  const intro=[
    "Aku harap kita bisa jadi asing...",
    "Bukan karena kita gagal...",
    "Tapi karena kita butuh waktu memperbaiki diri masing-masing..."
  ];

  for(let t of intro){
    textEl.innerHTML=t;
    await sleep(3000);
  }

  textEl.innerHTML="";
  await sleep(1000);

  // MASUK CHAT MODE
  chatEl.style.display="block";

  async function send(msg){
    let div=document.createElement("div");
    div.className="bubble me";
    div.innerHTML=msg + "<div class='status'>✓✓</div>";
    chatEl.appendChild(div);
    chatEl.scrollTop=chatEl.scrollHeight;
    await sleep(2000);
  }

  async function typing(){
    let t=document.createElement("div");
    t.className="typing";
    t.innerText="typing...";
    chatEl.appendChild(t);
    await sleep(3000);
    t.remove();
  }

  await send("Kamu masih inget aku?");
  await send("Atau aku cuma fase?");
  await send("Gapapa sih kalau iya...");
  
  await typing();

  await send("Aku cuma pengen jujur sekali ini aja...");
  await send("Aku masih mikirin kamu.");

  await typing();

  await send("Tapi aku juga sadar...");
  await send("Gak semua yang kita mau harus kita miliki 🙂");

  await sleep(3000);

  // LAST HIT
  await send("Jadi... aku mundur ya.");

  await sleep(4000);

  // BLACKOUT
  document.getElementById("blackout").style.opacity=1;

  // fade music
  let fadeOut=setInterval(()=>{
    if(music.volume>0.02){
      music.volume-=0.01;
    }else clearInterval(fadeOut);
  },200);
}
</script>

</body>
</html>
