<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

.bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: url('bg.jpg') center/cover no-repeat;
  filter: blur(10px);
  transform: scale(1.1);
  animation: zoom 25s ease-in-out infinite alternate;
  z-index: 0;
}

@keyframes zoom {
  from { transform: scale(1.1); }
  to { transform: scale(1.25); }
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  z-index: 1;
  pointer-events: none; /* INI KUNCINYA */
}

.container {
  position: relative;
  z-index: 2;
  max-width: 700px;
  width: 90%;
  max-height: 85vh;
  overflow-y: auto;
  margin: auto;
  color: white;
  text-align: center;
  padding: 20px;
}

#text {
  font-size: 16px;
  line-height: 2;
  white-space: pre-line;
  opacity: 0;
  transition: 1s;
}

button {
  margin-top: 25px;
  padding: 12px 28px;
  border: none;
  border-radius: 25px;
  background: white;
  color: black;
  cursor: pointer;
}

.fade-in {
  opacity: 1 !important;
}

#ending {
  margin-top: 40px;
  font-size: 18px;
  opacity: 0;
  transition: 2s;
}

/* BLACKOUT EFFECT */
.blackout {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: black;
  opacity: 0;
  z-index: 999;
  transition: 4s;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>
<div class="blackout" id="blackout"></div>

<div class="container">
  <div id="text"></div>
  <button onclick="start()">Klik pelan ya...</button>
  <div id="ending"></div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const paragraphs = [
`aku harap kita asing untuk saling memperbaiki diri.`,

`jika waktunya tiba
aku harap ada kesempatan buat bersama...`,

`aku hargai keputusan kamu
walau aku tau sebab pastinya`,

`setidaknya...
kamu pernah jadi warna
di antara hitam putih perjalanan hidupku.`,

`senang mengenal mu
senang pernah dilibatkan
dalam hal kecil dihidup kamu.`,

`aku bakal berhenti di hari ketiga ini...
karena aku lelah
berkelahi sama isi pikiranku.`,

`kisah ini lucu...
tapi ya cukup membekas.`,

`jika ketidaksengajaan itu terjadi lagi,
aku masih akan sangat senang...`,

`bahkan aku siap menerima kamu
dengan segala kondisi kamu.`,

`sesibuk apapun kamu...
jangan lupa kesehatan ya.`,

`karena rezeki yang gak pernah putus itu...
adalah sehat.`,

`kamu lagi berjuang sendirian sekarang...`,

`kalau kamu sakit...
itu cuma akan memperberat semuanya.`,

`jadi tolong...
jaga diri kamu baik-baik.`,

`dan jangan pernah berhenti jadi orang baik...`
];

let textEl = document.getElementById("text");
let endingEl = document.getElementById("ending");

async function start() {
  const music = document.getElementById("music");
  music.volume = 0;
  music.play();

  let vol = 0;
  let fade = setInterval(() => {
    if (vol < 0.4) {
      vol += 0.02;
      music.volume = vol;
    } else {
      clearInterval(fade);
    }
  }, 200);

  document.querySelector(".bg").style.filter = "blur(3px)";

  for (let p of paragraphs) {
    textEl.innerHTML = p;
    textEl.classList.add("fade-in");

    await new Promise(r => setTimeout(r, 4000));

    textEl.classList.remove("fade-in");
    await new Promise(r => setTimeout(r, 1000));
  }

  // ENDING MUNCUL
  endingEl.innerHTML = `
  Thank you for everything.<br><br>
  From Fadlian,<br>
  March 18, 2026
  `;
  endingEl.style.opacity = 1;

  await new Promise(r => setTimeout(r, 4000));

  // ENDING HILANG (INI YANG SAKIT 💀)
  endingEl.style.opacity = 0;

  await new Promise(r => setTimeout(r, 3000));

  // BLACKOUT
  document.getElementById("blackout").style.opacity = 1;

  // MUSIC FADE OUT
  let fadeOut = setInterval(() => {
    if (music.volume > 0.02) {
      music.volume -= 0.01;
    } else {
      clearInterval(fadeOut);
    }
  }, 200);
}
</script>

</body>
</html>
