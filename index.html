<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  height: 100vh;
  background: url('bg.jpg') no-repeat center center/cover;
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  overflow: hidden;
}

/* overlay cinematic */
body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to top, rgba(0,0,0,0.8), rgba(0,0,0,0.3));
}

/* container */
.container {
  position: relative;
  z-index: 2;
  max-width: 90%;
  text-align: center;
}

/* typing text */
#text {
  font-size: 18px;
  line-height: 1.8;
  white-space: pre-line;
  border-right: 2px solid white;
  display: inline-block;
  padding-right: 5px;
  animation: blink 1s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

/* button */
button {
  margin-top: 25px;
  padding: 10px 25px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.9);
  color: black;
  font-size: 14px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: pink;
}

/* fade in */
.fade {
  animation: fadeIn 2s ease forwards;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* floating hearts */
.heart {
  position: absolute;
  color: pink;
  animation: float 6s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 1; }
  to { transform: translateY(-10vh); opacity: 0; }
}
</style>

</head>
<body>

<div class="container fade">
  <div id="text"></div>
  <br>
  <button onclick="start()">Mulai</button>
</div>

<!-- AUDIO -->
<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const message = `aku harap kita asing untuk saling memperbaiki diri.
jika waktunya tiba aku harap ada kesempatan buat bersama,
aku hargai keputusan kamu walau aku tau sebab pastinya
setidaknya kamu pernah jadi warna di antara hitam putih perjalanan hidupku,

senang mengenal mu
senang pernah dilibatkan dalam hal kecil dihidup kamu,

aku bakal berhenti di hari ketiga ini
karena aku lelah berkelahi sama isi pikiranku,

kisah ini lucu tapi ya cukup membekas,

jika ketidaksengajaan yang memperkenalkan kita terjadi lagi
aku masih dan akan sangat senang
bahkan aku siap menerima kehadiran kamu dengan segala kondisi kamu.

sesibuk apapun jangan lupa sama kesehatan kamu ya
karena rezeki yang gak pernah putus diberikan itu kesehatan,

kamu sedang survive sendirian
kalau sampai sakit itu memperburuk keadaan,

jangan pernah berhenti jadi orang baik
walau sebatas niat ataupun sudah tereksekusi.

Thank you for everything.

From Fadlian, March 18, 2026`;

let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  }
}

function start() {
  // play music
  const music = document.getElementById("music");
  music.volume = 0.4;
  music.play();

  // start typing
  document.getElementById("text").innerHTML = "";
  i = 0;
  typeWriter();
}

/* hearts animation */
setInterval(() => {
  let heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);

  setTimeout(() => {
    heart.remove();
  }, 6000);
}, 400);
</script>

</body>
</html>
