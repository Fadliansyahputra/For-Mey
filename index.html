<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For You</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body,html{
  width:100%;
  height:100%;
  overflow:hidden;
  color:white;
}

/* BACKGROUND */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:url('bg.jpg') center/cover no-repeat;
  filter: blur(8px) brightness(0.5);
  z-index:0;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  z-index:1;
}

/* PARTICLE */
.particle{
  position:fixed;
  width:3px;
  height:3px;
  background:white;
  opacity:0.3;
  border-radius:50%;
  animation: float 10s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* CONTENT */
.content{
  position:relative;
  z-index:2;
  width:90%;
  max-width:700px;
  max-height:80vh;
  overflow-y:auto;
  margin:auto;
  top:50%;
  transform:translateY(-50%);
  padding:20px;
  line-height:1.8;
  white-space:pre-line;
  opacity:0;
  transition:1s;
}

/* BUTTON */
button{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:white;
  color:black;
  z-index:9999;
  cursor:pointer;
  font-size:16px;
}

/* CHAT */
.chat{
  position:fixed;
  bottom:10px;
  width:100%;
  padding:10px;
  display:none;
  z-index:3;
}

.bubble{
  max-width:70%;
  padding:10px;
  border-radius:15px;
  margin:5px;
  font-size:14px;
}

.me{
  background:#075e54;
  margin-left:auto;
}

.you{
  background:#333;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<button onclick="start()">Klik pelan ya...</button>

<div class="content" id="text"></div>

<div class="chat" id="chat">
  <div class="bubble me">aku kangen...</div>
  <div class="bubble you">...</div>
  <div class="bubble me">yaudah</div>
</div>

<audio id="music" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
const text = `aku harap kita asing untuk saling memperbaiki diri.
jika waktunya tiba aku harap ada kesempatan buat bersama,
aku hargai keputusan kamu walau aku tau sebab pastinya
setidaknya kamu pernah jadi warna di antara hitam putih perjalanan hidupku,
senang mengenal mu senang pernah dilibatkan dalam hal kecil dihidup kamu,
aku bakal berhenti di hari ketiga ini karena aku lelah berkelahi sama isi pikiranku,
kisah ini lucu tapi ya cukup membekas,
jika ketidaksengajaan yang memperkenalkan kita terjadi lagi
aku masih dan akan sangat senang bahkan aku siap menerima kehadiran kamu dengan segala kondisi kamu.

sesibuk apapun jangan lupa sama kesehatan kamu ya
karena rezeki yang gak pernah putus diberikan itu kesehatan,
kamu sedang survive sendirian kalau sampai sakit itu memperburuk keadaan,
jangan pernah berhenti jadi orang baik walau sebatas niat ataupun sudah tereksekusi.

Thank you for everything.

From Fadlian, March 18, 2026`;

function start(){
  const btn = document.querySelector("button");
  btn.style.display="none";

  const music = document.getElementById("music");
  music.volume = 0.4;
  music.play().catch(()=>{});

  typeText();

  document.getElementById("text").style.opacity=1;

  setTimeout(()=>{
    document.getElementById("chat").style.display="block";
  },15000);
}

/* TYPING EFFECT */
let i = 0;
function typeText(){
  const el = document.getElementById("text");
  if(i < text.length){
    el.innerHTML += text.charAt(i);
    i++;
    setTimeout(typeText, 25);
  }
}

/* PARTICLES AUTO */
for(let i=0;i<40;i++){
  let p = document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(5+Math.random()*5)+"s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
